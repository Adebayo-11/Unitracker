op-opacity:1%27 /&gt;&lt;/linearGradient&gt;&lt;/defs&gt;&lt;rect width=%27192%27 height=%27192%27 fill=%270d0f18%27/&gt;&lt;rect x=%2722%27 y=%2722%27 width=%27148%27 height=%27148%27 rx=%2730%27 fill=%27url(%23g)%27/&gt;&lt;g transform=%27translate(96,96)%27&gt;&lt;text x=%270%27 y=%2736%27 font-size=%2778%27 font-weight=%27800%27 font-family=%27Arial,%27 fill=%27white%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27&gt;U&lt;/text&gt;&lt;circle cx=%270%27 cy=%270%27 r=%2754%27 fill=%27none%27 stroke=%27rgba(255,255,255,0.25)%27 stroke-width=%273%27/&gt;&lt;circle cx=%270%27 cy=%270%27 r=%2754%27 fill=%27none%27 stroke=%27white%27 stroke-width=%273%27 stroke-dasharray=%2784.8%20169.6%27 stroke-linecap=%27round%27/&gt;&lt;/g&gt;&lt;/svg&gt;&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;,&quot;purpose&quot;:&quot;maskable&quot;}]}"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#0d0f18;color:#e8eaf0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* HEADER */
.hdr{padding:20px 16px 14px;background:linear-gradient(160deg,#1a2040,#0d0f18);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.hdr p{font-size:11px;color:#6b7280;margin-top:2px}
.ring{position:relative;width:52px;height:52px}
.ring svg{transform:rotate(-90deg)}
.ring-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-mid span:first-child{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;line-height:1}
.ring-mid span:last-child{font-size:9px;color:#6b7280}
/* TABS */
.tabs{display:flex;background:#0d0f18;border-bottom:1px solid rgba(255,255,255,0.08)}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-bottom:2.5px solid transparent;color:#6b7280;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{color:#e8eaf0;border-bottom-color:#fff}
/* PANES */
.pane{flex:1;overflow-y:auto;padding:14px;display:none}
.pane.active{display:block}
.pane::-webkit-scrollbar{display:none}
/* CARDS */
.card{background:#161a27;border-radius:12px;margin-bottom:10px;overflow:hidden;border-left:4px solid}
.card-top{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;cursor:pointer}
.c-code{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.c-name{font-size:11px;color:#888;margin-top:2px;display:block}
.c-prog{font-size:11px;color:#6b7280}
.pbar{height:3px;background:rgba(255,255,255,0.07)}
.pfill{height:100%;transition:width .4s}
.topics{padding:6px 10px 12px}
.trow{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.trow:active{background:rgba(255,255,255,0.06)}
.chk{width:18px;height:18px;border-radius:4px;border:2px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s}
.tlabel{font-size:12px;line-height:1.5;color:#dde}
.tlabel.done{text-decoration:line-through;opacity:.4}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:5px 11px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
/* TIMETABLE */
.day-block{background:#161a27;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.08)}
.day-block.today{border-color:rgba(255,255,255,0.25)}
.day-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 13px 6px;color:#6b7280}
.day-name.today{color:#FFD700}
.day-slots{padding:0 10px 10px;display:flex;flex-direction:column;gap:6px}
.slot{display:flex;align-items:center;gap:8px;background:#1d2236;border-radius:9px;padding:9px 10px}
.slot-info{flex:1;min-width:0}
.slot-time{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;margin-bottom:2px}
.slot-course{font-size:12px;color:#aaa}
.slot-note{font-size:10px;color:#555;margin-top:2px}
.slot-alarm{font-size:10px;margin-top:3px}
.slot-btns{display:flex;gap:5px}
.ibtn{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.add-row{display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,0.03);border:1.5px dashed rgba(255,255,255,0.1);border-radius:9px;padding:9px;cursor:pointer;font-size:12px;color:#666;transition:all .2s}
.add-row:active{background:rgba(255,255,255,0.08)}
/* ALARMS */
.acard{background:#161a27;border-radius:12px;padding:16px;margin-bottom:12px}
.atitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px}
.arow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.arow:last-child{border-bottom:none}
.aday{font-size:10px;color:#6b7280;margin-bottom:2px}
.acode{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.atime{font-size:11px;color:#6b7280;margin-top:2px}
.badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer}
.badge.on{background:rgba(76,175,82,0.2);color:#4CAF82}
.badge.off{background:rgba(255,255,255,0.06);color:#555}
.notif-btn{width:100%;padding:13px;background:linear-gradient(90deg,#3a6fd8,#5a4fc7);border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Syne',sans-serif}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.scode{font-size:10px;font-weight:700;width:60px;flex-shrink:0;font-family:'Syne',sans-serif}
.sbg{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px}
.sfill{height:100%;border-radius:3px;transition:width .4s}
.spct{font-size:10px;color:#6b7280;width:26px;text-align:right}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:99}
.modal{background:#1e2438;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:600px}
.mtitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px}
.mlbl{font-size:11px;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
select,input[type=time],input[type=text]{width:100%;padding:11px;border-radius:8px;background:#0d0f18;border:1.5px solid rgba(255,255,255,0.1);color:#eee;font-size:14px;margin-bottom:13px;font-family:'DM Sans',sans-serif}
.mbtns{display:flex;gap:10px;margin-top:4px}
.mbtn{flex:1;padding:13px;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif}
.mbtn.c{background:rgba(255,255,255,0.08);color:#ccc}
.mbtn.s{background:linear-gradient(90deg,#3a6fd8,#5a4fc7);color:#fff}
.mbtn.s:disabled{opacity:.3}
.hidden{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>UniTracker</h1>
    <p>2nd Semester · University of Lagos</p>
  </div>
  <div class="ring">
    <svg width="52" height="52" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
      <circle id="arc" cx="18" cy="18" r="15.9" fill="none" stroke="#4f8ef7" stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round"/>
    </svg>
    <div class="ring-mid"><span id="rpct">0%</span><span id="rsub">0/0</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('courses')">📚 Courses</button>
  <button class="tab" onclick="switchTab('timetable')">📅 Timetable</button>
  <button class="tab" onclick="switchTab('alarms')">🔔 Alarms</button>
</div>

<div id="pane-courses" class="pane active"></div>
<div id="pane-timetable" class="pane"></div>
<div id="pane-alarms" class="pane"></div>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <div class="mtitle" id="mtitle">Add Class</div>
    <div class="mlbl">Day</div>
    <select id="m-day">
      <option value="">-- Select day --</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
      <option>Thursday</option><option>Friday</option><option>Saturday</option>
    </select>
    <div class="mlbl">Time</div>
    <input type="time" id="m-time"/>
    <div class="mlbl">Course</div>
    <select id="m-course"><option value="">-- Select course --</option></select>
    <div class="mlbl">Note (optional)</div>
    <input type="text" id="m-note" placeholder="e.g. LT1, Bring calculator"/>
    <div class="mbtns">
      <button class="mbtn c" onclick="closeModal()">Cancel</button>
      <button class="mbtn s" id="msave" onclick="saveSlot()" disabled>Save</button>
    </div>
  </div>
</div>

<script>
var COURSES = [
  {id:"GST112",code:"GST 112",color:"#E8A838",title:"Nigerian Peoples & Cultures",units:2,topics:["Nigerian history & culture – Yoruba peoples","Nigerian history & culture – Hausa peoples","Nigerian history & culture – Igbo peoples","Nigerian history & culture – minorities","National consciousness & nation-building"]},
  {id:"CHM102",code:"CHM 102",color:"#4CAF82",title:"General Chemistry II",units:2,topics:["Historical survey of organic chemistry","Fullerenes & nanochemistry","Electronic theory in organic chemistry","Organic reaction types","Aliphatic hydrocarbons","Aromatic hydrocarbons"]},
  {id:"CHM108",code:"CHM 108",color:"#56A8D8",title:"General Practical Chemistry II",units:1,topics:["Lab rules & safety procedures","Ignition, boiling & melting point tests","Solubility tests on organic compounds","Density measurements","Recrystallization of organic compounds"]},
  {id:"MTH102",code:"MTH 102",color:"#9B6BD4",title:"Elementary Mathematics II (Calculus)",units:2,topics:["Functions of a real variable & graphs","Limits & continuity","Derivative as limit of rate of change","Differentiation of standard functions","Maxima & minima"]},
  {id:"PHY102",code:"PHY 102",color:"#E05F5F",title:"General Physics II (Electricity & Magnetism)",units:2,topics:["Electrostatics – charge & charging methods","Coulomb's law & superposition","Electric field & potential","Capacitance","Current & resistance"]},
  {id:"PHY104",code:"PHY 104",color:"#E8884A",title:"General Physics IV (Waves & Optics)",units:2,topics:["Simple harmonic motion","Damped SHM & Q values","Forced SHM & resonance","Coupled SHM & normal modes","Wave motion & equations"]},
  {id:"GET102",code:"GET 102",color:"#3ABAB4",title:"Engineering Graphics & Solid Modelling I",units:2,topics:["Design thinking & engineering graphics","First & third angle projections","Isometric projections","Sectional views","Dimensioning & tolerancing"]},
  {id:"STA112",code:"STA 112",color:"#C45FC9",title:"Probability I",units:3,topics:["Permutation & combination","Concepts of probability","Random variables","Probability & distribution functions","Binomial & Poisson distributions"]},
  {id:"MTH103",code:"MTH 103",color:"#D4885A",title:"Elementary Mathematics III (Vectors & Dynamics)",units:2,topics:["Vectors in 1–3 dimensions","Direction cosines & scalar multiplication","Linear independence & basis vectors","Applications to mechanics"]}
];

var DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var SK = "ut_v5";
var ALARM_MIN = 15;
var state, expanded, activeCourse, editIdx, alarmTimers;

function init() {
  expanded = {};
  activeCourse = null;
  editIdx = null;
  alarmTimers = [];
  try {
    var raw = localStorage.getItem(SK);
    state = raw ? JSON.parse(raw) : null;
  } catch(e) { state = null; }
  if (!state || typeof state !== 'object') state = {checked:{}, slots:[]};
  if (!state.checked) state.checked = {};
  if (!Array.isArray(state.slots)) state.slots = [];
  COURSES.forEach(function(c) {
    if (!state.checked[c.id]) {
      state.checked[c.id] = {};
      c.topics.forEach(function(_,i){ state.checked[c.id][i] = false; });
    }
  });
  renderRing();
  renderCourses();
}

function save() {
  try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e){}
}

function getP(id) {
  var done = 0, c = COURSES.find(function(x){return x.id===id;});
  var ch = state.checked[id] || {};
  c.topics.forEach(function(_,i){ if(ch[i]) done++; });
  return {done:done, total:c.topics.length};
}

function totalP() {
  var d=0,t=0;
  COURSES.forEach(function(c){ var p=getP(c.id); d+=p.done; t+=p.total; });
  return {done:d, total:t};
}

function todayName() {
  var d = new Date().getDay();
  return DAYS[[6,0,1,2,3,4,5][d]] || "Monday";
}

function fmt12(t) {
  if(!t) return '';
  var parts = t.split(':'), h=parseInt(parts[0]), m=parseInt(parts[1]);
  var ap = h>=12?'PM':'AM';
  return (h%12||12)+':'+(m<10?'0':'')+m+' '+ap;
}

function fireTime(t) {
  if(!t) return '--';
  var parts=t.split(':'), h=parseInt(parts[0]), m=parseInt(parts[1]);
  var tot = h*60+m-ALARM_MIN;
  tot = ((tot%1440)+1440)%1440;
  var fh=Math.floor(tot/60), fm=tot%60;
  return fmt12((fh<10?'0':'')+fh+':'+(fm<10?'0':'')+fm);
}

// ── RING ──
function renderRing() {
  var p = totalP();
  var pct = p.total ? Math.round(p.done/p.total*100) : 0;
  document.getElementById('rpct').textContent = pct+'%';
  document.getElementById('rsub').textContent = p.done+'/'+p.total;
  document.getElementById('arc').setAttribute('stroke-dasharray', pct+' '+(100-pct));
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('active', ['courses','timetable','alarms'][i]===name);
  });
  document.querySelectorAll('.pane').forEach(function(p){
    p.classList.remove('active');
  });
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='timetable') renderTimetable();
  if(name==='alarms') renderAlarms();
}

// ── COURSES ──
function renderCourses() {
  var el = document.getElementById('pane-courses');
  var h = '<div class="chips">';
  COURSES.forEach(function(c) {
    var p=getP(c.id), pct=Math.round(p.done/p.total*100), on=activeCourse===c.id;
    h += '<button class="chip" style="border-color:'+c.color+';background:'+(on?c.color:'transparent')+';color:'+(on?'#fff':c.color)+'" onclick="setActive(\''+c.id+'\')">'
      + c.code+' <span style="font-size:10px;opacity:.8">'+pct+'%</span></button>';
  });
  h += '</div>';
  COURSES.forEach(function(c) {
    if(activeCourse && activeCourse!==c.id) return;
    var p=getP(c.id), pct=Math.round(p.done/p.total*100), exp=expanded[c.id];
    h += '<div class="card" style="border-left-color:'+c.color+'">'
      +'<div class="card-top" onclick="toggleExp(\''+c.id+'\')">'
      +'<div><span class="c-code" style="color:'+c.color+'">'+c.code+'</span>'
      +'<span class="c-name">'+c.title+' <span style="color:#444;font-size:10px">('+c.units+'u)</span></span></div>'
      +'<div style="display:flex;align-items:center;gap:8px"><span class="c-prog">'+p.done+'/'+p.total+'</span>'
      +'<span style="font-size:10px;color:#555">'+(exp?'▲':'▼')+'</span></div>'
      +'</div>'
      +'<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+c.color+'"></div></div>'
      +(exp ? renderTopics(c) : '')
      +'</div>';
  });
  if(activeCourse) h += '<button onclick="setActive(null)" style="display:block;margin:10px auto;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#6b7280;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:12px">View All</button>';
  el.innerHTML = h;
}

function renderTopics(c) {
  var h = '<div class="topics">';
  c.topics.forEach(function(t,i) {
    var done = state.checked[c.id] && state.checked[c.id][i];
    h += '<div class="trow" style="background:'+(done?c.color+'15':'transparent')+'" onclick="toggleT(\''+c.id+'\','+i+')">'
      +'<div class="chk" style="border-color:'+c.color+';background:'+(done?c.color:'transparent')+'">'+( done?'✓':'')+'</div>'
      +'<span class="tlabel'+(done?' done':'')+'">'+t+'</span>'
      +'</div>';
  });
  return h+'</div>';
}

function setActive(id) { activeCourse=id; if(id) expanded[id]=true; renderCourses(); }
function toggleExp(id) { expanded[id]=!expanded[id]; renderCourses(); }
function toggleT(cid,idx) {
  if(!state.checked[cid]) state.checked[cid]={};
  state.checked[cid][idx] = !state.checked[cid][idx];
  save(); renderRing(); renderCourses();
}

// ── TIMETABLE ──
function renderTimetable() {
  var today = todayName();
  var h = '<div style="font-family:Syne,sans-serif;font-size:19px;font-weight:800;margin-bottom:4px">Class Timetable</div>'
    +'<div style="font-size:12px;color:#6b7280;margin-bottom:14px;line-height:1.5">Tap + Add class to fill in your schedule. You can update times anytime.</div>';
  DAYS.forEach(function(day) {
    var isToday = day===today;
    var daySlots = state.slots.filter(function(s){return s.day===day;}).sort(function(a,b){return a.time.localeCompare(b.time);});
    h += '<div class="day-block'+(isToday?' today':'')+'"><div class="day-name'+(isToday?' today':'')+'">'+day+(isToday?' 📍':'')+'</div><div class="day-slots">';
    daySlots.forEach(function(sl) {
      var idx = state.slots.indexOf(sl);
      var course = COURSES.find(function(c){return c.id===sl.courseId;});
      var alarmOn = sl.alarmOn!==false;
      h += '<div class="slot">'
        +'<div class="slot-info">'
        +'<div class="slot-time" style="color:'+(course?course.color:'#aaa')+'">'+fmt12(sl.time)+' · '+(course?course.code:sl.courseId)+'</div>'
        +'<div class="slot-course">'+(course?course.title:'')+' </div>'
        +(sl.note?'<div class="slot-note">📝 '+sl.note+'</div>':'')
        +'<div class="slot-alarm" style="color:'+(alarmOn?'#4CAF82':'#444')+'">'+(alarmOn?'🔔 Alarm: '+fireTime(sl.time):'🔕 Alarm off')+'</div>'
        +'</div>'
        +'<div class="slot-btns">'
        +'<button class="ibtn" style="background:rgba(255,255,255,0.1);color:#fff" onclick="openModal('+idx+')">✏️</button>'
        +'<button class="ibtn" style="background:'+(alarmOn?'rgba(76,175,82,0.15)':'rgba(255,255,255,0.06)')+';color:'+(alarmOn?'#4CAF82':'#666')+'" onclick="toggleAlarm('+idx+')">'+(alarmOn?'🔔':'🔕')+'</button>'
        +'<button class="ibtn" style="background:rgba(255,68,68,0.15);color:#ff7070" onclick="delSlot('+idx+')">✕</button>'
        +'</div></div>';
    });
    h += '<div class="add-row" onclick="openModal(null,\''+day+'\')">＋ Add class</div></div></div>';
  });
  document.getElementById('pane-timetable').innerHTML = h;
}

function toggleAlarm(idx) { state.slots[idx].alarmOn=!(state.slots[idx].alarmOn!==false); save(); renderTimetable(); renderAlarms(); scheduleAlarms(); }
function delSlot(idx) { if(!confirm('Delete this class?')) return; state.slots.splice(idx,1); save(); renderTimetable(); renderAlarms(); scheduleAlarms(); }

// ── MODAL ──
function openModal(idx, preDay) {
  editIdx = idx;
  var sl = idx!==null ? state.slots[idx] : null;
  document.getElementById('mtitle').textContent = sl?'Edit Class':'Add Class';
  document.getElementById('m-day').value = sl?sl.day:(preDay||'');
  document.getElementById('m-time').value = sl?sl.time:'';
  document.getElementById('m-note').value = sl?sl.note||'':'';
  var cs = document.getElementById('m-course');
  cs.innerHTML = '<option value="">-- Select course --</option>';
  COURSES.forEach(function(c) {
    var o=document.createElement('option'); o.value=c.id; o.textContent=c.code+' – '+c.title;
    if(sl&&sl.courseId===c.id) o.selected=true;
    cs.appendChild(o);
  });
  checkSave();
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('overlay').classList.add('hidden'); }

document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

function checkSave() {
  var ok = document.getElementById('m-day').value && document.getElementById('m-time').value && document.getElementById('m-course').value;
  document.getElementById('msave').disabled = !ok;
}
['m-day','m-time','m-course'].forEach(function(id){ document.getElementById(id).addEventListener('change', checkSave); });

function saveSlot() {
  var slot = {
    day: document.getElementById('m-day').value,
    time: document.getElementById('m-time').value,
    courseId: document.getElementById('m-course').value,
    note: document.getElementById('m-note').value.trim(),
    alarmOn: true
  };
  if(editIdx!==null) state.slots[editIdx]=slot;
  else state.slots.push(slot);
  save(); closeModal(); renderTimetable(); renderAlarms(); scheduleAlarms();
}

// ── ALARMS ──
function renderAlarms() {
  var el = document.getElementById('pane-alarms');
  var today = todayName();
  var notifOk = 'Notification' in window && Notification.permission==='granted';
  var sorted = state.slots.slice().sort(function(a,b){
    var di=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    return di!==0?di:a.time.localeCompare(b.time);
  });
  var alarmRows = sorted.length===0
    ? '<div style="font-size:13px;color:#555;font-style:italic">No classes yet — add them in Timetable.</div>'
    : sorted.map(function(sl){
        var idx=state.slots.indexOf(sl), c=COURSES.find(function(x){return x.id===sl.courseId;}), on=sl.alarmOn!==false;
        return '<div class="arow">'
          +'<div><div class="aday">'+sl.day+(sl.day===today?' · Today':'')+'</div>'
          +'<div class="acode" style="color:'+(c?c.color:'#aaa')+'">'+(c?c.code:sl.courseId)+'</div>'
          +'<div class="atime">🕐 '+fmt12(sl.time)+' · fires '+fireTime(sl.time)+'</div></div>'
          +'<span class="badge '+(on?'on':'off')+'" onclick="toggleAlarm('+idx+')">'+(on?'ON':'OFF')+'</span>'
          +'</div>';
      }).join('');

  var todaySlots = state.slots.filter(function(s){return s.day===today;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var todayHtml = todaySlots.length===0
    ? '<div style="font-size:13px;color:#555;font-style:italic">No classes today.</div>'
    : todaySlots.map(function(sl){
        var c=COURSES.find(function(x){return x.id===sl.courseId;});
        return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
          +'<div style="width:3px;height:36px;border-radius:2px;background:'+(c?c.color:'#aaa')+';flex-shrink:0"></div>'
          +'<div><div style="font-size:12px;font-weight:700;font-family:Syne,sans-serif;color:'+(c?c.color:'#aaa')+'">'+(c?c.code:'?')+' · '+fmt12(sl.time)+'</div>'
          +'<div style="font-size:11px;color:#aaa">'+(c?c.title:'')+' </div></div></div>';
      }).join('');

  var sumRows = COURSES.map(function(c){
    var p=getP(c.id), pct=Math.round(p.done/p.total*100);
    return '<div class="srow"><span class="scode" style="color:'+c.color+'">'+c.code+'</span>'
      +'<div class="sbg"><div class="sfill" style="width:'+pct+'%;background:'+c.color+'"></div></div>'
      +'<span class="spct">'+pct+'%</span></div>';
  }).join('');

  el.innerHTML =
    '<div style="font-family:Syne,sans-serif;font-size:19px;font-weight:800;margin-bottom:4px">Alarms</div>'
    +'<div style="font-size:12px;color:#6b7280;margin-bottom:14px">Notifications fire 15 min before each class.</div>'
    +'<div class="acard"><div class="atitle">🔔 Notification Status</div>'
    +(notifOk
      ?'<div style="font-size:13px;color:#4CAF82;font-weight:600">✅ Notifications enabled</div>'
      :'<button class="notif-btn" onclick="reqNotif()">Enable Notifications</button>')
    +'<div id="nst" style="font-size:12px;color:#888;margin-top:6px;text-align:center"></div></div>'
    +'<div class="acard"><div class="atitle">📅 Today ('+today+')</div>'+todayHtml+'</div>'
    +'<div class="acard"><div class="atitle">⏰ All Class Alarms</div>'+alarmRows+'</div>'
    +'<div class="acard"><div class="atitle">📊 Topic Progress</div>'+sumRows+'</div>';
}

async function reqNotif() {
  if(!('Notification' in window)){document.getElementById('nst').textContent='❌ Not supported here.';return;}
  var p = await Notification.requestPermission();
  if(p==='granted'){scheduleAlarms();setTimeout(function(){renderAlarms();},500);}
  else document.getElementById('nst').textContent='❌ Blocked. Allow in browser settings.';
}

// ── SCHEDULE ALARMS ──
function scheduleAlarms() {
  alarmTimers.forEach(function(t){clearTimeout(t);});
  alarmTimers=[];
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  var now = new Date();
  state.slots.forEach(function(sl) {
    if(sl.alarmOn===false) return;
    var course = COURSES.find(function(c){return c.id===sl.courseId;});
    var dayIdx = DAYS.indexOf(sl.day);
    var slotDow = (dayIdx+1)%7;
    var parts = sl.time.split(':'), h=parseInt(parts[0]), m=parseInt(parts[1]);
    var todayDow = now.getDay();
    var diff = (slotDow-todayDow+7)%7;
    var target = new Date(now);
    target.setDate(now.getDate()+diff);
    target.setHours(h, m-ALARM_MIN, 0, 0);
    if(target<=now) target.setDate(target.getDate()+7);
    var delay = target-now;
    var tid = setTimeout(function(){
      new Notification('🔔 Class in 15 min', {body:(course?course.code:sl.courseId)+' · '+sl.day+' '+fmt12(sl.time)+(sl.note?'\n'+sl.note:'')});
      scheduleAlarms();
    }, delay);
    alarmTimers.push(tid);
  });
}

init();

// Force cache bust on load
if(window.location.search.indexOf('v=')===-1){
  window.location.replace(window.location.href.split('?')[0]+'?v=5');
}
</script>
