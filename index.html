<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0d0f18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="UniTracker"/>
<title>UniTracker · UNILAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f18;--s1:#161a27;--s2:#1d2236;--bdr:rgba(255,255,255,0.08);--txt:#e8eaf0;--muted:#6b7280;--acc:#4f8ef7;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--fb);color:var(--txt);display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100%}

/* HEADER */
.hdr{padding:calc(var(--st) + 16px) 16px 14px;background:linear-gradient(160deg,#1a2040,#0d0f18);border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr h1{font-family:var(--fh);font-size:21px;font-weight:800;letter-spacing:-.5px}
.hdr p{font-size:11px;color:var(--muted);margin-top:2px}
.ring-wrap{position:relative;width:52px;height:52px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--fh);font-size:14px;font-weight:800;line-height:1}
.ring-sub{font-size:9px;color:var(--muted)}

/* TABS */
.tabs{display:flex;padding:10px 14px 0;gap:4px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--bg)}
.tab{flex:1;padding:9px 2px;background:none;border:none;color:var(--muted);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:var(--txt);border-bottom-color:#fff}

/* SCROLL */
.pane{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;display:none}
.pane.on{display:block}
.pane::-webkit-scrollbar{display:none}

/* SECTION */
.sec-title{font-family:var(--fh);font-size:19px;font-weight:800;margin-bottom:4px}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}

/* CARDS */
.card{background:var(--s1);border-radius:13px;margin-bottom:10px;overflow:hidden;border-left:4px solid}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;cursor:pointer}
.c-code{font-family:var(--fh);font-size:13px;font-weight:700}
.c-name{font-size:12px;color:#aaa;display:block;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-txt{font-size:11px;color:var(--muted)}
.prog-bar{height:3px;background:rgba(255,255,255,0.07)}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}
.topic-list{padding:4px 10px 12px}
.t-row{display:flex;align-items:flex-start;gap:10px;padding:8px 7px;border-radius:8px;cursor:pointer;margin-bottom:1px;transition:background .15s}
.t-row:active{background:rgba(255,255,255,0.05)!important}
.chk{width:18px;height:18px;border-radius:5px;border:2px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px;color:#fff;font-weight:700}
.t-txt{font-size:12px;line-height:1.5;color:#dde;transition:all .2s}
.t-txt.done{text-decoration:line-through;opacity:.4}

/* TIMETABLE */
.tt-grid{display:flex;flex-direction:column;gap:8px}
.day-block{background:var(--s1);border-radius:12px;overflow:hidden;border:1.5px solid var(--bdr)}
.day-block.today{border-color:rgba(255,255,255,0.25)}
.day-lbl{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:9px 13px 6px;color:var(--muted);display:flex;align-items:center;gap:6px}
.day-lbl.today-lbl{color:#FFD700}
.slots{padding:0 10px 10px;display:flex;flex-direction:column;gap:6px}
.slot{display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:9px;padding:9px 10px}
.slot-info{flex:1;min-width:0}
.slot-time{font-family:var(--fh);font-size:11px;font-weight:700;margin-bottom:2px}
.slot-course{font-size:12px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-alarm{font-size:10px;margin-top:2px}
.slot-alarm.on{color:#4CAF82}
.slot-alarm.off{color:#555}
.slot-btns{display:flex;gap:5px;flex-shrink:0}
.ic-btn{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.edit-ic{background:rgba(255,255,255,0.1);color:#fff}
.del-ic{background:rgba(255,68,68,0.15);color:#ff7070}
.add-slot{display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.12);border-radius:9px;padding:9px;cursor:pointer;font-size:12px;color:#555;transition:all .2s;margin-top:2px}
.add-slot:active{background:rgba(255,255,255,0.08)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;justify-content:center;z-index:999;animation:fi .2s}
.modal{background:#1e2438;border-radius:20px 20px 0 0;padding:20px 16px calc(var(--sb) + 28px);width:100%;max-width:700px;animation:su .3s cubic-bezier(.4,0,.2,1)}
.modal-title{font-family:var(--fh);font-size:16px;font-weight:800;margin-bottom:16px}
.lbl{font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
select,input[type=time],input[type=text]{width:100%;padding:10px 11px;border-radius:8px;background:var(--bg);border:1.5px solid var(--bdr);color:#eee;font-size:13px;margin-bottom:12px;font-family:var(--fb);appearance:auto}
input[type=time]{appearance:auto;-webkit-appearance:auto}
.modal-row{display:flex;gap:10px;margin-top:4px}
.mbtn{flex:1;padding:12px;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fb)}
.mbtn.cancel{background:rgba(255,255,255,0.08);color:#ccc}
.mbtn.save{background:linear-gradient(90deg,#3a6fd8,#5a4fc7);color:#fff}
.mbtn.save:disabled{opacity:.35}

/* REMINDERS TAB */
.r-card{background:var(--s1);border-radius:13px;padding:16px;margin-bottom:12px}
.r-icon{font-size:26px;margin-bottom:8px}
.r-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:4px}
.r-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.notif-btn{width:100%;padding:13px;background:linear-gradient(90deg,#3a6fd8,#6b4fc7);border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fh)}
.notif-st{margin-top:8px;font-size:12px;color:#888;text-align:center}
.alarm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.alarm-row:last-child{border-bottom:none}
.alarm-left .a-day{font-size:11px;color:var(--muted);margin-bottom:2px}
.alarm-left .a-info{font-size:13px;font-weight:600}
.alarm-left .a-time{font-size:11px;color:var(--muted);margin-top:2px}
.badge{padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--fh)}
.badge.on{background:rgba(76,175,82,0.2);color:#4CAF82}
.badge.off{background:rgba(255,255,255,0.06);color:#555}
.s-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.s-code{font-size:10px;font-weight:700;width:65px;flex-shrink:0;font-family:var(--fh)}
.s-bg{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px}
.s-fill{height:100%;border-radius:3px;transition:width .5s}
.s-pct{font-size:10px;color:var(--muted);width:26px;text-align:right}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
.chip{padding:5px 11px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--fh)}

@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <h1>UniTracker</h1>
      <p>2nd Semester · University of Lagos</p>
    </div>
    <div class="ring-wrap">
      <svg width="52" height="52" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
        <circle id="arc" cx="18" cy="18" r="15.9" fill="none" stroke="#4f8ef7" stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="rpct">0%</span>
        <span class="ring-sub" id="rsub">0/0</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="courses">📚 Courses</button>
    <button class="tab" data-tab="timetable">📅 Timetable</button>
    <button class="tab" data-tab="alarms">🔔 Alarms</button>
  </div>

  <div id="pane-courses" class="pane on"></div>
  <div id="pane-timetable" class="pane"></div>
  <div id="pane-alarms" class="pane"></div>
</div>

<!-- SLOT MODAL -->
<div id="overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="m-title">Add Class</div>
    <div class="lbl">Day</div>
    <select id="m-day">
      <option value="">-- Select day --</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
      <option>Thursday</option><option>Friday</option><option>Saturday</option>
    </select>
    <div class="lbl">Time</div>
    <input type="time" id="m-time"/>
    <div class="lbl">Course</div>
    <select id="m-course">
      <option value="">-- Select course --</option>
    </select>
    <div class="lbl">Note (optional)</div>
    <input type="text" id="m-note" placeholder="e.g. Venue: LT1, Bring calculator"/>
    <div class="modal-row">
      <button class="mbtn cancel" id="m-cancel">Cancel</button>
      <button class="mbtn save" id="m-save" disabled>Save</button>
    </div>
  </div>
</div>

<script>
const COURSES=[
  {id:"GST112",code:"GST 112",title:"Nigerian Peoples & Cultures",units:2,color:"#E8A838",
   topics:["Nigerian history & culture up to 1800 – Yoruba peoples","Nigerian history & culture up to 1800 – Hausa peoples","Nigerian history & culture up to 1800 – Igbo peoples","Peoples & cultures of minority ethnic groups","Nigeria under colonial rule – advent & colonial administration","Evolution of Nigeria – Amalgamation of 1914","Formation of political parties & nationalist movement","Nation building challenges – Military intervention","Nigerian Civil War","Indigenous trade, market system & apprenticeship","Social justice – definition & classification of law","Judiciary & fundamental human rights","Basic Nigerian norms, values & citizenship","Indigenous languages, usage & development","Negative attitudes: Cultism, kidnapping & social vices","Re-orientation strategies – OFN, WAIC, MAMSER, NOA","Current socio-political & cultural developments"]},
  {id:"CHM102",code:"CHM 102",title:"General Chemistry II",units:2,color:"#4CAF82",
   topics:["Historical survey of organic chemistry","Fullerenes – 4th allotrope of carbon & nanochemistry","Electronic theory in organic chemistry","Isolation & purification of organic compounds","Qualitative & quantitative structure determination","Nomenclature & functional group classes","Introductory reaction mechanism & kinetics","Stereochemistry","Chemistry of alkanes & alkenes","Chemistry of alkynes, alcohols & ethers","Chemistry of amines, alkyl halides & nitriles","Chemistry of aldehydes, ketones & carboxylic acids","Chemistry of selected metals & non-metals","Comparative chemistry – Group IA & IIA elements","Comparative chemistry – Group IVA elements","Introduction to transition metal chemistry"]},
  {id:"CHM108",code:"CHM 108",title:"General Practical Chemistry II",units:1,color:"#56A8D8",
   topics:["Lab rules & safety procedures","Ignition, boiling point & melting point tests","Solubility tests on organic compounds","Elemental tests on compounds","Functional group analysis – acidic compounds","Functional group analysis – basic compounds","Functional group analysis – neutral compounds","Quantitative analysis using volumetric methods"]},
  {id:"MTH102",code:"MTH 102",title:"Elementary Mathematics II (Calculus)",units:2,color:"#9B6BD4",
   topics:["Functions of a real variable & graphs","Limits & idea of continuity","The derivative as limit of rate of change","Techniques of differentiation","Maxima, minima & extreme curve sketching","Integration as inverse of differentiation","Definite integrals & reduction formulae","Application of integration to areas","Application of integration to volumes","Approximate integration – Trapezium rule","Approximate integration – Simpson's rule"]},
  {id:"PHY102",code:"PHY 102",title:"General Physics II (Electricity & Magnetism)",units:2,color:"#E05F5F",
   topics:["Electrostatics – charge properties & methods of charging","Coulomb's law & superposition principle","Electric field & electric potential","Gauss's law & capacitance","Electric dipoles & energy in electric fields","Conductors, insulators & DC circuits – Ohm's law","Resistor combinations & DC circuit analysis","Magnetic fields & Lorentz force","Biot-Savart & Ampère's laws","Magnetic dipoles, dielectrics & energy in magnetic fields","Electromagnetic induction, Faraday & Lenz's laws","Self & mutual inductances; transformers","Maxwell's equations & electromagnetic waves","AC voltages & currents in R, C & L"]},
  {id:"PHY104",code:"PHY 104",title:"General Physics IV (Waves & Optics)",units:2,color:"#E8884A",
   topics:["Simple harmonic motion – energy in vibrating systems","Damped SHM, Q values & power response","Forced SHM, resonance & transients","Coupled SHM & normal modes","Types & properties of waves – transverse & longitudinal","Superposition, interference & diffraction","Dispersion, polarization & waves at interfaces","Wave energy, power & 1-D wave equation","2-D & 3-D wave equations, phase & group velocities","Echo, beats & Doppler effect","Propagation of sound in gases, solids & liquids","Nature & propagation of light; reflection & refraction","Internal reflection, dispersion & scattering","Thin lenses & optical instruments","Wave nature of light – Huygens, interference & diffraction"]},
  {id:"GET102",code:"GET 102",title:"Engineering Graphics & Solid Modelling I",units:2,color:"#3ABAB4",
   topics:["Introduction to design thinking & engineering graphics","First & third angle orthogonal projections","Isometric projections","Sectioning & conventional practices","Conic sections & development","Freehand & guided sketching – pictorial & orthographic","Visualisation & solid modelling in design","User interfaces, design & animation workspaces","Viewports & sectioning to shop drawings","Sheet metal & surface modelling","Material selection & rendering","Prototyping with Fusion 360 / SolidWorks"]},
  {id:"STA112",code:"STA 112",title:"Probability I",units:3,color:"#C45FC9",
   topics:["Permutation & combination","Concepts & principles of probability","Random variables","Probability & distribution functions","Binomial distribution","Geometric & Poisson distributions","Normal & sampling distributions","Exploratory data analysis"]},
  {id:"MTH103",code:"MTH 103",title:"Elementary Mathematics III (Vectors & Dynamics)",units:2,color:"#D4885A",
   topics:["Geometric representation of vectors in 1-3 dimensions","Direction cosines, addition & scalar multiplication","Linear independence, scalar & vector products","Differentiation & integration of vectors","2-D coordinate geometry – straight lines & circles","Parabola, ellipse & hyperbola; tangents & normals","Kinematics – velocity & acceleration","Force, momentum & laws of motion under gravity","Projectiles & resisted vertical motion","Elastic string & simple pendulum","Impulse & impact of spheres"]}
];

const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const SK="unitracker_v3";
const ALARM_BEFORE=15; // minutes

let state=load();
let expanded={};
let activeCourse=null;
let editIdx=null; // index in state.slots being edited

function load(){
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch{}
  return{checked:{},slots:[]};
}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch{}}
function ensureChecked(){COURSES.forEach(c=>{if(!state.checked[c.id]){state.checked[c.id]={};c.topics.forEach((_,i)=>state.checked[c.id][i]=false);}});}
ensureChecked();

// ── UTILS ──
function getP(id){const done=Object.values(state.checked[id]||{}).filter(Boolean).length;return{done,total:COURSES.find(c=>c.id===id).topics.length};}
function totalP(){let d=0,t=0;COURSES.forEach(c=>{const p=getP(c.id);d+=p.done;t+=p.total;});return{done:d,total:t};}
function todayName(){return DAYS[([6,0,1,2,3,4,5])[new Date().getDay()]]||'Monday';}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';return`${h%12||12}:${String(m).padStart(2,'0')} ${ap}`;}

// ── RING ──
function renderRing(){
  const{done,total}=totalP();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rsub').textContent=done+'/'+total;
  document.getElementById('arc').setAttribute('stroke-dasharray',pct+' '+(100-pct));
}

// ══════════════════════════════
// COURSES TAB
// ══════════════════════════════
function renderCourses(){
  const el=document.getElementById('pane-courses');
  let h='<div class="chips">';
  COURSES.forEach(c=>{
    const p=getP(c.id),pct=Math.round(p.done/p.total*100),on=activeCourse===c.id;
    h+=`<button class="chip" style="border-color:${c.color};background:${on?c.color:'transparent'};color:${on?'#fff':c.color}" onclick="setActive('${c.id}')">${c.code} <span style="font-size:10px;opacity:.8">${pct}%</span></button>`;
  });
  h+='</div>';
  COURSES.forEach(c=>{
    if(activeCourse&&activeCourse!==c.id)return;
    const p=getP(c.id),pct=Math.round(p.done/p.total*100),exp=expanded[c.id];
    h+=`<div class="card" style="border-left-color:${c.color}">
      <div class="card-hdr" onclick="toggleExp('${c.id}')">
        <div style="flex:1;min-width:0">
          <span class="c-code" style="color:${c.color}">${c.code}</span>
          <span class="c-name">${c.title} <span style="color:#555;font-size:10px">(${c.units}u)</span></span>
        </div>
        <div class="card-right"><span class="prog-txt">${p.done}/${p.total}</span><span style="font-size:10px;color:var(--muted)">${exp?'▲':'▼'}</span></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${c.color}"></div></div>
      ${exp?renderTopics(c):''}
    </div>`;
  });
  if(activeCourse)h+=`<button onclick="setActive(null)" style="display:block;margin:10px auto 0;background:transparent;border:1px solid var(--bdr);color:var(--muted);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--fb)">Show all courses</button>`;
  el.innerHTML=h;
}
function renderTopics(c){
  let h='<div class="topic-list">';
  c.topics.forEach((t,i)=>{
    const done=state.checked[c.id]?.[i];
    h+=`<div class="t-row" style="background:${done?c.color+'16':'transparent'}" onclick="toggleT('${c.id}',${i})">
      <div class="chk" style="border-color:${c.color};background:${done?c.color:'transparent'}">${done?'✓':''}</div>
      <span class="t-txt ${done?'done':''}">${t}</span>
    </div>`;
  });
  return h+'</div>';
}
function setActive(id){activeCourse=id;if(id)expanded[id]=true;renderCourses();}
function toggleExp(id){expanded[id]=!expanded[id];renderCourses();}
function toggleT(
