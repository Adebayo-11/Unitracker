<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="ptitle pdesc">
  <title id="ptitle">UniTracker profile avatar</title>
  <desc id="pdesc">Circular avatar with accent gradient and UT monogram.</desc>
  <defs>
    <linearGradient id="pg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4f8ef7"/>
      <stop offset="1" stop-color="#6bb6ff"/>
    </linearGradient>
    <style><![CDATA[
      .mono{font-family:Syne, 'DM Sans', Arial, Helvetica, sans-serif; font-weight:800; fill:#ffffff; font-size:200px}
    ]]></style>
  </defs>

  <rect width="100%" height="100%" fill="transparent" />
  <g transform="translate(256,256)">
    <circle cx="0" cy="0" r="220" fill="url(#pg)" />
    <circle cx="0" cy="0" r="210" fill-opacity="0.06" fill="#000" />
    <text x="0" y="60" text-anchor="middle" class="mono">UT</text>
  </g>
</svg>
