<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80" role="img" aria-labelledby="title desc">
  <title id="title">UniTracker logo</title>
  <desc id="desc">A compact UniTracker wordmark with a simple U-shaped book icon using the app accent blue #4f8ef7.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#4f8ef7"/>
      <stop offset="1" stop-color="#6bb6ff"/>
    </linearGradient>
    <style><![CDATA[
      .t{font-family: Syne, 'DM Sans', Arial, Helvetica, sans-serif; font-weight:800; font-size:32px; fill:#e8eaf0;}
      .sub{font-family:'DM Sans', Arial, Helvetica, sans-serif; font-weight:600; font-size:12px; fill:#9aa3bf}
    ]]></style>
  </defs>

  <!-- icon: rounded square with stylized 'U' (book-like) -->
  <g transform="translate(8,8)">
    <rect width="64" height="64" rx="12" fill="url(#g)" />
    <path d="M22 24 v12 a6 6 0 0 0 6 6 h8 a6 6 0 0 0 6 -6 v-12" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- small page lines -->
    <path d="M30 34 h10" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(90,50)">
    <text x="0" y="-6" class="t">UniTracker</text>
    <text x="0" y="18" class="sub">UNILAG</text>
  </g>
</svg>
